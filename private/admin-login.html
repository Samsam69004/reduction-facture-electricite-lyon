<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion Admin</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --accent: #1f2937;
        --line: #e5e7eb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top right, #fdecc8, transparent 35%), var(--bg);
        font-family: Inter, system-ui, -apple-system, sans-serif;
        color: var(--text);
      }
      .card {
        width: min(450px, 92vw);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 20px 40px rgb(17 24 39 / 10%);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.55rem;
      }
      p {
        margin: 0 0 14px;
        color: var(--muted);
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
      }
      button {
        width: 100%;
        margin-top: 12px;
        border: none;
        border-radius: 10px;
        padding: 11px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: var(--accent);
      }
      button:disabled {
        opacity: 0.75;
        cursor: default;
      }
      .msg {
        min-height: 1.2rem;
        margin-top: 10px;
        font-weight: 600;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Admin Leads</h1>
      <p>Connecte-toi pour accéder au tableau des leads.</p>

      <form id="login-form" method="post" action="/admin/login">
        <label for="password">Mot de passe admin</label>
        <input id="password" type="password" name="password" required autocomplete="current-password" />
        <button id="btn" type="submit">Se connecter</button>
        <div id="msg" class="msg" aria-live="polite"></div>
      </form>
    </main>
    <script src="/admin-login.js" defer></script>
  </body>
</html>
